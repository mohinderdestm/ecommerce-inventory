<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Inventory Auth Service</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
  header { background: #1e293b; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
  header h1 { font-size: 1.1rem; font-weight: 600; color: #f1f5f9; }
  header span { font-size: 0.8rem; color: #64748b; }
  .container { max-width: 960px; margin: 40px auto; padding: 0 24px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 24px; }
  .tab { padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 0.875rem; border: 1px solid #334155; background: transparent; color: #94a3b8; transition: all 0.15s; }
  .tab.active { background: #3b82f6; border-color: #3b82f6; color: #fff; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 28px; }
  .form-group { margin-bottom: 16px; }
  label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  input, select { width: 100%; padding: 10px 14px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 0.9rem; outline: none; transition: border-color 0.15s; }
  input:focus, select:focus { border-color: #3b82f6; }
  button[type="submit"] { width: 100%; padding: 11px; background: #3b82f6; color: #fff; border: none; border-radius: 6px; font-size: 0.9rem; font-weight: 500; cursor: pointer; margin-top: 8px; transition: background 0.15s; }
  button[type="submit"]:hover { background: #2563eb; }
  .result { margin-top: 20px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; padding: 16px; font-size: 0.8rem; font-family: monospace; white-space: pre-wrap; word-break: break-all; max-height: 300px; overflow-y: auto; color: #94a3b8; }
  .result.success { border-color: #22c55e; color: #86efac; }
  .result.error { border-color: #ef4444; color: #fca5a5; }
  .token-bar { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 14px 18px; margin-bottom: 24px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .token-bar label { color: #64748b; font-size: 0.78rem; white-space: nowrap; text-transform: none; letter-spacing: 0; margin: 0; }
  .token-bar input { flex: 1; min-width: 0; font-size: 0.75rem; }
  .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
  .badge.admin { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed55; }
  .badge.customer { background: #0284c722; color: #38bdf8; border: 1px solid #0284c755; }
  .badge.supplier { background: #d9770622; color: #fb923c; border: 1px solid #d9770655; }
  h2 { font-size: 1rem; font-weight: 600; color: #f1f5f9; margin-bottom: 20px; }
  .panel { display: none; } .panel.active { display: block; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <h1>⚡ Inventory Auth Service</h1>
  <span id="userBadge"></span>
</header>

<div class="container">

  <!-- Token input bar -->
  <div class="token-bar">
    <label>JWT Token:</label>
    <input id="tokenInput" placeholder="Paste your token here after login..." />
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('register')">Register</button>
    <button class="tab" onclick="switchTab('login')">Login</button>
    <button class="tab" onclick="switchTab('me')">My Profile</button>
    <button class="tab" onclick="switchTab('users')">All Users</button>
  </div>

  <!-- Register -->
  <div id="panel-register" class="panel active">
    <div class="card">
      <h2>Create Account</h2>
      <form onsubmit="handleRegister(event)">
        <div class="two-col">
          <div class="form-group">
            <label>Username</label>
            <input name="username" placeholder="john_doe" required />
          </div>
          <div class="form-group">
            <label>Full Name</label>
            <input name="full_name" placeholder="John Doe" />
          </div>
        </div>
        <div class="two-col">
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="john@example.com" required />
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input name="phone" placeholder="+91-9876543210" />
          </div>
        </div>
        <div class="two-col">
          <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Min 8 chars, 1 uppercase, 1 digit" required />
          </div>
          <div class="form-group">
            <label>Role</label>
            <select name="role">
              <option value="customer">Customer</option>
              <option value="supplier">Supplier</option>
              <option value="admin">Admin</option>
            </select>
          </div>
        </div>
        <button type="submit">Register</button>
      </form>
      <div id="reg-result" class="result" style="display:none"></div>
    </div>
  </div>

  <!-- Login -->
  <div id="panel-login" class="panel">
    <div class="card">
      <h2>Login</h2>
      <form onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="john@example.com" required />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required />
        </div>
        <button type="submit">Login</button>
      </form>
      <div id="login-result" class="result" style="display:none"></div>
    </div>
  </div>

  <!-- Me -->
  <div id="panel-me" class="panel">
    <div class="card">
      <h2>My Profile</h2>
      <button type="submit" onclick="handleMe()">Fetch My Profile</button>
      <div id="me-result" class="result" style="display:none"></div>
    </div>
  </div>

  <!-- Users (Admin) -->
  <div id="panel-users" class="panel">
    <div class="card">
      <h2>All Users <span style="font-size:0.75rem;color:#64748b;font-weight:400">(Admin only)</span></h2>
      <button type="submit" onclick="handleUsers()">Fetch Users</button>
      <div id="users-result" class="result" style="display:none"></div>
    </div>
  </div>

</div>

<script>
const BASE = '/api/v1';

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['register','login','me','users'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
}

function getToken() {
  return document.getElementById('tokenInput').value.trim();
}

function showResult(elId, data, isError) {
  const el = document.getElementById(elId);
  el.style.display = 'block';
  el.className = 'result ' + (isError ? 'error' : 'success');
  el.textContent = JSON.stringify(data, null, 2);
}

async function apiFetch(path, options = {}) {
  const token = getToken();
  const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const res = await fetch(BASE + path, { ...options, headers });
  const data = await res.json();
  return { ok: res.ok, data };
}

async function handleRegister(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = Object.fromEntries(fd.entries());
  const { ok, data } = await apiFetch('/auth/register', { method: 'POST', body: JSON.stringify(body) });
  showResult('reg-result', data, !ok);
}

async function handleLogin(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = Object.fromEntries(fd.entries());
  const { ok, data } = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify(body) });
  showResult('login-result', data, !ok);
  if (ok && data.access_token) {
    document.getElementById('tokenInput').value = data.access_token;
    updateBadge(data.user);
  }
}

async function handleMe() {
  const { ok, data } = await apiFetch('/auth/me');
  showResult('me-result', data, !ok);
  if (ok) updateBadge(data);
}

async function handleUsers() {
  const { ok, data } = await apiFetch('/users/');
  showResult('users-result', data, !ok);
}

function updateBadge(user) {
  const el = document.getElementById('userBadge');
  if (!user) return;
  el.innerHTML = `<span class="badge ${user.role}">${user.role}</span>&nbsp;&nbsp;<span style="font-size:0.8rem;color:#cbd5e1">${user.username}</span>`;
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Management - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="auth-container">
  <div class="auth-card">

    <h2 id="title">Login</h2>

    <form id="authForm">
      <input type="text" id="name" placeholder="Name" style="display:none;" />
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />

      <select id="role" style="display:none;">
        <option value="user">User</option>
        <option value="supplier">Supplier</option>
        <option value="admin">Admin</option>
      </select>
      <button type="submit">Submit</button>
    </form>

    <p class="toggle-text" id="toggleText">
      Don't have an account? <span onclick="toggleMode()">Sign Up</span>
    </p>

    <p id="message"></p>

  </div>
</div>

<script src="/js/login.js"></script>
</body>
</html>

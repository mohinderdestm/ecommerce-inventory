<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supplier Registration - Inventory System</title>
    <link rel="stylesheet" href="/static/css/register.css" />
  </head>
  <body class="supplier-register-page">
    <div class="container">
      <div class="login-card supplier-card">
        <h2>Partner Registration</h2>
        <p>Register your business to start supplying</p>

        <form id="supplierForm">
          <div class="form-grid">
            <div class="full-width">
              <small class="section-caption">Account Details</small>
            </div>
            <input
              type="email"
              id="email"
              placeholder="Business Email"
              required
            />
            <input
              type="password"
              id="password"
              placeholder="Password"
              required
            />

            <div class="full-width section-gap">
              <small class="section-caption">Business Details</small>
            </div>
            <input
              type="text"
              id="name"
              placeholder="Company Name"
              required
              class="full-width"
            />
            <input
              type="text"
              id="contact_person"
              placeholder="Contact Person Name"
              required
            />
            <input type="text" id="phone" placeholder="Phone Number" required />
            <input type="text" id="gst" placeholder="GST Number" required />
            <input
              type="text"
              id="payment_terms"
              placeholder="Payment Terms (e.g. Net 30)"
            />

            <div class="full-width">
              <input
                type="text"
                id="address"
                placeholder="Full Business Address"
                required
              />
            </div>
          </div>

          <button type="submit" id="submitBtn">Register Business</button>
        </form>

        <button
          type="button"
          class="secondary-btn back-role-btn"
          onclick="window.location.href = '/register'"
        >
          Back to Roles
        </button>

        <p class="error" id="errorMsg"></p>
        <p class="success" id="successMsg"></p>
      </div>
    </div>

    <script src="/static/js/register_supplier.js"></script>
  </body>
</html>

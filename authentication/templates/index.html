<!DOCTYPE html>
<html>
<head>
    <title>Auth System</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f6fa;

            padding-top: 100px;

        .card {

            padding: 30px;
            width: 300px;
            margin: auto;

    <div class="card">
